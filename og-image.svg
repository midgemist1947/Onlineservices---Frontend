<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#14161C"/>
  <g opacity="0.06">
    <rect x="0" y="0" width="1200" height="630" fill="url(#grain)"/>
  </g>
  <defs>
    <pattern id="grain" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#14161C"/>
      <circle cx="1" cy="1" r="0.6" fill="#F4EEE2"/>
    </pattern>
  </defs>

  <!-- stacked file cards -->
  <g transform="translate(770,150)">
    <g transform="rotate(8)">
      <rect x="0" y="40" width="260" height="320" rx="14" fill="#1C1F27" stroke="#2A2E38" stroke-width="2"/>
    </g>
    <g transform="rotate(-4)">
      <rect x="-20" y="20" width="260" height="320" rx="14" fill="#F4EEE2"/>
      <rect x="10" y="60" width="120" height="18" rx="6" fill="#C1542C"/>
      <rect x="10" y="100" width="200" height="10" rx="5" fill="#14161C" opacity="0.35"/>
      <rect x="10" y="120" width="170" height="10" rx="5" fill="#14161C" opacity="0.25"/>
      <rect x="10" y="140" width="190" height="10" rx="5" fill="#14161C" opacity="0.25"/>
    </g>
    <g transform="rotate(2)">
      <rect x="30" y="0" width="260" height="320" rx="14" fill="#E8A33D"/>
      <rect x="62" y="40" width="110" height="16" rx="6" fill="#14161C" opacity="0.85"/>
      <text x="62" y="300" font-family="Arial, sans-serif" font-size="20" fill="#14161C" opacity="0.85">.FIGMA</text>
    </g>
  </g>

  <text x="90" y="270" font-family="Arial, sans-serif" font-weight="700" font-size="78" fill="#F4EEE2">Dossier</text>
  <text x="92" y="320" font-family="Arial, sans-serif" font-size="28" fill="#9AA0AC">Digital goods, properly filed.</text>
  <rect x="92" y="350" width="46" height="6" rx="3" fill="#E8A33D"/>
</svg>
